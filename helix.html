<script>
// ── data ───────────────────────────────────────────────────────────────────
const DOMAIN_ORDER = [
  'foundations','native','linux','web','backend',
  'creative','voice','aiml','cuda','genai','agents'
];
const DOMAIN_COLORS = {
  foundations:'#9B5DE5', native:'#C084FC', linux:'#00F5D4',
  web:'#00BBF9', backend:'#F77F00', creative:'#F15BB5',
  voice:'#BD93F9', aiml:'#FEE440', cuda:'#4CC9F0',
  genai:'#FF6B6B', agents:'#06D6A0'
};
const DOMAIN_LABEL = {
  foundations:'Foundations', native:'Native', linux:'Systems',
  web:'Web', backend:'Backend', creative:'Creative',
  voice:'Voice', aiml:'AI/ML', cuda:'CUDA',
  genai:'GenAI', agents:'Agents'
};

const SKILLS = [
  {name:'C++',domain:'foundations',start:2015,end:2026.4,depth:8},
  {name:'Python',domain:'foundations',start:2020,end:2026.4,depth:10},
  {name:'Java',domain:'foundations',start:2017,end:2021,depth:6,decay:0},
  {name:'Algorithms',domain:'foundations',start:2017,end:2026.4,depth:8},
  {name:'Node graphs',domain:'foundations',start:2016,end:2022,depth:6,decay:0.15},
  {name:'CNN/early ML',domain:'foundations',start:2017,end:2020,depth:4,decay:0.2},
  {name:'Competitive prog',domain:'foundations',start:2019,end:2022,depth:7,decay:0.25},
  {name:'Swift',domain:'native',start:2023,end:2026.4,depth:6},
  {name:'Rust',domain:'native',start:2026,end:2026.4,depth:4},
  {name:'Flutter/Dart',domain:'native',start:2025,end:2026.4,depth:6},
  {name:'Arduino',domain:'native',start:2024,end:2026.4,depth:5},
  {name:'Kali/WiFi',domain:'linux',start:2019,end:2021,depth:6,decay:0.2},
  {name:'Arch Linux',domain:'linux',start:2022,end:2026.4,depth:9},
  {name:'Bash',domain:'linux',start:2018,end:2026.4,depth:8},
  {name:'Docker',domain:'linux',start:2022,end:2026.4,depth:9},
  {name:'Kubernetes',domain:'linux',start:2025,end:2026.4,depth:7},
  {name:'HTML/CSS',domain:'web',start:2017,end:2026.4,depth:7},
  {name:'JavaScript',domain:'web',start:2017,end:2026.4,depth:8},
  {name:'React',domain:'web',start:2022,end:2026.4,depth:7},
  {name:'TypeScript',domain:'web',start:2024,end:2026.4,depth:7},
  {name:'FastAPI',domain:'backend',start:2022,end:2026.4,depth:10},
  {name:'AWS/GCP',domain:'backend',start:2022,end:2026.4,depth:8},
  {name:'Redis',domain:'backend',start:2022,end:2026.4,depth:8},
  {name:'Elasticsearch',domain:'backend',start:2024,end:2026.4,depth:8},
  {name:'Langfuse',domain:'backend',start:2025,end:2026.4,depth:8},
  {name:'Photoshop',domain:'creative',start:2017,end:2022,depth:7,decay:0.25},
  {name:'After Effects',domain:'creative',start:2018,end:2022.5,depth:7,decay:0.1},
  {name:'Blender',domain:'creative',start:2019,end:2022.5,depth:8,decay:0.15},
  {name:'Cinema 4D',domain:'creative',start:2019,end:2022,depth:5,decay:0.05},
  {name:'Drone/DaVinci',domain:'creative',start:2023,end:2024.5,depth:6,decay:0.1},
  {name:'Tacotron2/TTS',domain:'voice',start:2022,end:2023.5,depth:8,decay:0.15},
  {name:'Whisper',domain:'voice',start:2024,end:2026.4,depth:7},
  {name:'Custom TTS',domain:'voice',start:2024,end:2025,depth:7,decay:0.2},
  {name:'PyTorch',domain:'aiml',start:2021,end:2026.4,depth:10},
  {name:'TensorFlow',domain:'aiml',start:2021,end:2023,depth:7,decay:0.1},
  {name:'NumPy/Pandas',domain:'aiml',start:2021,end:2026.4,depth:9},
  {name:'YOLO',domain:'aiml',start:2022,end:2026.4,depth:7},
  {name:'AR+diffusion',domain:'aiml',start:2025.85,end:2026.4,depth:8},
  {name:'Stable Diffusion',domain:'genai',start:2022.6,end:2025,depth:10,decay:0.3},
  {name:'Diffusion models',domain:'genai',start:2022,end:2026.4,depth:9},
  {name:'LoRA/Dreambooth',domain:'genai',start:2022.8,end:2026.4,depth:9},
  {name:'FLUX.1',domain:'genai',start:2024,end:2025,depth:8,decay:0.25},
  {name:'DPO/RLHF',domain:'genai',start:2024,end:2026.4,depth:7},
  {name:'CUDA',domain:'cuda',start:2022,end:2026.4,depth:8},
  {name:'FlashAttention',domain:'cuda',start:2022,end:2026.4,depth:9},
  {name:'Quantization',domain:'cuda',start:2022,end:2026.4,depth:8},
  {name:'vLLM',domain:'cuda',start:2025,end:2026.4,depth:8},
  {name:'TensorRT',domain:'cuda',start:2023,end:2026.4,depth:7},
  {name:'LangChain',domain:'agents',start:2024,end:2026.4,depth:9},
  {name:'LangGraph',domain:'agents',start:2025,end:2026.4,depth:10},
  {name:'DSPy',domain:'agents',start:2025,end:2026.4,depth:8},
  {name:'MCP/FastMCP',domain:'agents',start:2025.5,end:2026.4,depth:9},
  {name:'GraphRAG',domain:'agents',start:2026,end:2026.4,depth:8},
  {name:'hermes-agent',domain:'agents',start:2025.6,end:2026.4,depth:8},
  {name:'Paperclip',domain:'agents',start:2026.2,end:2026.4,depth:8},
];

// ── intensity model (matches gradient.html) ────────────────────────────────
const HALF_LIFE = 1.8, RAMP = 0.5;
function contribution(skill, domain_x, year) {
  const domIdx = DOMAIN_ORDER.indexOf(skill.domain);
  const dx = domain_x - domIdx;
  const spatialW = Math.exp(-0.5 * Math.pow(dx / 0.7, 2));
  const floor = (skill.decay ?? 0) * skill.depth;
  let t;
  if (year < skill.start - RAMP) t = 0;
  else if (year < skill.start) t = skill.depth * (year - (skill.start - RAMP)) / RAMP;
  else if (year <= skill.end) t = skill.depth;
  else t = floor + (skill.depth - floor) * Math.exp(-(year - skill.end) * Math.LN2 / HALF_LIFE);
  return spatialW * Math.max(0, t) / skill.depth;
}

function hexToRgb(hex) {
  return [
    parseInt(hex.slice(1,3),16)/255,
    parseInt(hex.slice(3,5),16)/255,
    parseInt(hex.slice(5,7),16)/255
  ];
}
const SKILL_RGB = SKILLS.map(s => hexToRgb(DOMAIN_COLORS[s.domain]));

// ── three.js setup ─────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06070f);
scene.fog = new THREE.FogExp2(0x06070f, 0.04);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(6, 5, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(5, 0, 4);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 6;
controls.maxDistance = 30;

// lights
scene.add(new THREE.AmbientLight(0x111122, 1.0));
const topLight = new THREE.PointLight(0xffffff, 30, 40);
topLight.position.set(5, 8, 6);
scene.add(topLight);
const frontLight = new THREE.PointLight(0x06D6A0, 20, 25);
frontLight.position.set(8, 2, 14);
scene.add(frontLight);

// ── terrain geometry ───────────────────────────────────────────────────────
const NX = 110, NZ = 80;
const X_SPAN = 10;        // domain spectrum
const Z_SPAN = 11.5;      // years 2015 → 2026.5
const Y_MAX  = 5;

const positions = new Float32Array(NX * NZ * 3);
const colors    = new Float32Array(NX * NZ * 3);

// pass 1: compute heights + colors
const heights = new Float32Array(NX * NZ);
let maxH = 0;
for (let iz = 0; iz < NZ; iz++) {
  // flip z so "now" faces camera (front)
  const actual_z = (NZ - 1 - iz) / (NZ - 1) * Z_SPAN;
  const year = 2026.5 - actual_z;
  for (let ix = 0; ix < NX; ix++) {
    const domain_x = ix / (NX - 1) * X_SPAN;
    let h = 0;
    let R = 0, G = 0, B = 0;
    for (let si = 0; si < SKILLS.length; si++) {
      const w = contribution(SKILLS[si], domain_x, year);
      if (w < 0.001) continue;
      h += w;
      // screen blend
      const [r, g, b] = SKILL_RGB[si];
      const cw = w * 0.85;
      R = R + r * cw * (1 - R);
      G = G + g * cw * (1 - G);
      B = B + b * cw * (1 - B);
    }
    const idx = iz * NX + ix;
    heights[idx] = h;
    if (h > maxH) maxH = h;
    colors[idx * 3]     = R;
    colors[idx * 3 + 1] = G;
    colors[idx * 3 + 2] = B;
  }
}

// pass 2: write positions with normalised height
for (let iz = 0; iz < NZ; iz++) {
  const z = iz / (NZ - 1) * Z_SPAN;
  for (let ix = 0; ix < NX; ix++) {
    const x = ix / (NX - 1) * X_SPAN;
    const idx = iz * NX + ix;
    const hNorm = heights[idx] / (maxH || 1);
    const y = Math.pow(hNorm, 0.75) * Y_MAX;
    positions[idx * 3]     = x;
    positions[idx * 3 + 1] = y;
    positions[idx * 3 + 2] = z;

    // brighten color where peaks are tall (add white-hot glow on summits)
    const boost = Math.pow(hNorm, 1.6) * 0.35;
    colors[idx * 3]     = Math.min(1, colors[idx * 3]     + boost);
    colors[idx * 3 + 1] = Math.min(1, colors[idx * 3 + 1] + boost);
    colors[idx * 3 + 2] = Math.min(1, colors[idx * 3 + 2] + boost);

    // also fade very low areas to subtle blue
    if (hNorm < 0.05) {
      const fade = 0.18 + hNorm * 2;
      colors[idx * 3]     *= fade;
      colors[idx * 3 + 1] *= fade;
      colors[idx * 3 + 2] *= fade;
    }
  }
}

// ── wireframe lines (line segments) ─────────────────────────────────────────
const lineCount = (NX - 1) * NZ + NX * (NZ - 1);   // horizontal + vertical edges
const linePos   = new Float32Array(lineCount * 2 * 3);
const lineCol   = new Float32Array(lineCount * 2 * 3);
let lp = 0, lc = 0;
function pushSeg(a, b) {
  linePos[lp++] = positions[a*3];   linePos[lp++] = positions[a*3+1]; linePos[lp++] = positions[a*3+2];
  linePos[lp++] = positions[b*3];   linePos[lp++] = positions[b*3+1]; linePos[lp++] = positions[b*3+2];
  lineCol[lc++] = colors[a*3];      lineCol[lc++] = colors[a*3+1];    lineCol[lc++] = colors[a*3+2];
  lineCol[lc++] = colors[b*3];      lineCol[lc++] = colors[b*3+1];    lineCol[lc++] = colors[b*3+2];
}
for (let iz = 0; iz < NZ; iz++) {
  for (let ix = 0; ix < NX - 1; ix++) {
    pushSeg(iz * NX + ix, iz * NX + ix + 1);
  }
}
for (let ix = 0; ix < NX; ix++) {
  for (let iz = 0; iz < NZ - 1; iz++) {
    pushSeg(iz * NX + ix, (iz + 1) * NX + ix);
  }
}

const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
lineGeo.setAttribute('color',    new THREE.BufferAttribute(lineCol, 3));
const lineMat = new THREE.LineBasicMaterial({
  vertexColors: true,
  transparent: true,
  opacity: 0.85,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const wireMesh = new THREE.LineSegments(lineGeo, lineMat);
scene.add(wireMesh);

// ── filled surface (subtle glow underneath) ────────────────────────────────
const surfGeo = new THREE.BufferGeometry();
surfGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
surfGeo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
const indices = [];
for (let iz = 0; iz < NZ - 1; iz++) {
  for (let ix = 0; ix < NX - 1; ix++) {
    const a = iz * NX + ix;
    const b = iz * NX + ix + 1;
    const c = (iz + 1) * NX + ix;
    const d = (iz + 1) * NX + ix + 1;
    indices.push(a, c, b, b, c, d);
  }
}
surfGeo.setIndex(indices);
surfGeo.computeVertexNormals();
const surfMat = new THREE.MeshBasicMaterial({
  vertexColors: true,
  transparent: true,
  opacity: 0.08,
  side: THREE.DoubleSide,
  depthWrite: false
});
const surfMesh = new THREE.Mesh(surfGeo, surfMat);
scene.add(surfMesh);

// ── ground grid (very faint) ───────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(X_SPAN * 1.4, Z_SPAN * 1.4);
const groundMat = new THREE.MeshBasicMaterial({ color: 0x0a0c1a, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(X_SPAN/2, -0.02, Z_SPAN/2);
scene.add(ground);

// faint axis lines along borders
function addAxisLine(x1, z1, x2, z2, color, opacity) {
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array([x1, 0.01, z1, x2, 0.01, z2]), 3));
  const m = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
  scene.add(new THREE.Line(g, m));
}
addAxisLine(0, 0, X_SPAN, 0, 0x06D6A0, 0.4);          // front edge (now)
addAxisLine(0, Z_SPAN, X_SPAN, Z_SPAN, 0x9B5DE5, 0.18); // back edge (2015)
addAxisLine(0, 0, 0, Z_SPAN, 0x9B5DE5, 0.18);
addAxisLine(X_SPAN, 0, X_SPAN, Z_SPAN, 0x06D6A0, 0.18);

// ── year ring lines on ground ──────────────────────────────────────────────
const RING_YEARS = [2016, 2018, 2020, 2022, 2024];
RING_YEARS.forEach(yr => {
  const z = ((2026.5 - yr) / Z_SPAN) * Z_SPAN;
  const pts = [new THREE.Vector3(0, 0.01, z), new THREE.Vector3(X_SPAN, 0.01, z)];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: 0x333355, transparent: true, opacity: 0.6 });
  scene.add(new THREE.Line(geo, mat));
});

// ── HTML axis label overlays (projected each frame) ────────────────────────
const labels = [];
function makeLabel(text, cls) {
  const el = document.createElement('div');
  el.className = 'axis-label' + (cls ? ' ' + cls : '');
  el.textContent = text;
  document.body.appendChild(el);
  return el;
}
// edge labels
labels.push({ el: makeLabel('Systems & Foundations', 'edge'),     pos: new THREE.Vector3(0,        0.05, Z_SPAN * 0.5) });
labels.push({ el: makeLabel('LLM Agents & RAG',      'edge'),     pos: new THREE.Vector3(X_SPAN,   0.05, Z_SPAN * 0.5) });
labels.push({ el: makeLabel('2026  · now',           'now edge'), pos: new THREE.Vector3(X_SPAN/2, 0.05, 0.1) });
labels.push({ el: makeLabel('2015',                  'edge'),     pos: new THREE.Vector3(X_SPAN/2, 0.05, Z_SPAN - 0.1) });
// three domain ticks along x
const tickDomains = ['foundations','aiml','agents'];
tickDomains.forEach(key => {
  const di = DOMAIN_ORDER.indexOf(key);
  const x  = di / (DOMAIN_ORDER.length - 1) * X_SPAN;
  const el = makeLabel(DOMAIN_LABEL[key]);
  el.style.color = DOMAIN_COLORS[key];
  el.style.opacity = '0.7';
  labels.push({ el, pos: new THREE.Vector3(x, -0.05, Z_SPAN + 0.6) });
});

const tmpVec = new THREE.Vector3();
function updateLabels() {
  const w = window.innerWidth, h = window.innerHeight;
  for (const lab of labels) {
    tmpVec.copy(lab.pos).project(camera);
    const sx = (tmpVec.x * 0.5 + 0.5) * w;
    const sy = (-tmpVec.y * 0.5 + 0.5) * h;
    const inFront = tmpVec.z < 1;
    lab.el.style.display = inFront ? 'block' : 'none';
    lab.el.style.left = sx + 'px';
    lab.el.style.top  = sy + 'px';
  }
}

// ── projected HTML labels (skill peaks, years, domains) ────────────────────
let skillLabelsContainer = document.getElementById('skillLabels');
if (!skillLabelsContainer) {
  skillLabelsContainer = document.createElement('div');
  skillLabelsContainer.id = 'skillLabels';
  document.body.appendChild(skillLabelsContainer);
}
const projectedLabels = [];

function makeProjectedLabel(text, color, fontSize, opacity) {
  const el = document.createElement('span');
  el.textContent = text;
  el.style.cssText =
    `position:absolute; font-size:${fontSize}px; color:${color}; opacity:${opacity};` +
    ` white-space:nowrap; text-shadow: 0 0 8px #06070f, 0 0 4px #06070f;` +
    ` pointer-events:none; font-family:'Space Grotesk',sans-serif;` +
    ` transform: translate(-50%,-50%);`;
  skillLabelsContainer.appendChild(el);
  return el;
}

// helper: sample terrain world-Y for arbitrary (worldX, worldZ)
function sampleTerrainY(worldX, worldZ) {
  const ix = Math.max(0, Math.min(NX - 1, Math.round(worldX / X_SPAN * (NX - 1))));
  const iz = Math.max(0, Math.min(NZ - 1, Math.round(worldZ / Z_SPAN * (NZ - 1))));
  return positions[(iz * NX + ix) * 3 + 1];
}

// skill peak labels (depth >= 7 only)
SKILLS.forEach(skill => {
  if (skill.depth < 7) return;
  const domIdx = DOMAIN_ORDER.indexOf(skill.domain);
  const peakYear = (skill.start + Math.min(skill.end, 2026.4)) / 2;
  const domainX = domIdx / (DOMAIN_ORDER.length - 1) * X_SPAN;
  const peakZ = ((2026.5 - peakYear) / Z_SPAN) * Z_SPAN;
  const peakY = sampleTerrainY(domainX, peakZ) + 0.25;
  const color = DOMAIN_COLORS[skill.domain];
  const el = makeProjectedLabel(skill.name, color, 10, 0.85);
  projectedLabels.push({ el, pos: new THREE.Vector3(domainX, peakY, peakZ) });
});

// year labels along right edge
const YEAR_RING_LABELS = [
  { y: 2016, t: '2016' },
  { y: 2018, t: '2018' },
  { y: 2020, t: '2020' },
  { y: 2022, t: '2022' },
  { y: 2024, t: '2024' },
];
YEAR_RING_LABELS.forEach(({ y, t }) => {
  const z = ((2026.5 - y) / Z_SPAN) * Z_SPAN;
  const el = makeProjectedLabel(t, '#8a8ca8', 10, 0.7);
  projectedLabels.push({ el, pos: new THREE.Vector3(X_SPAN + 0.5, 0, z) });
});
// "now" marker
{
  const el = makeProjectedLabel('2026 → now', '#06D6A0', 10, 0.9);
  projectedLabels.push({ el, pos: new THREE.Vector3(X_SPAN + 0.5, 0, 0) });
}

// domain labels along front edge (z=0, near camera)
const DOMAIN_SHORT = {
  foundations: 'Foundations', native: 'Native', linux: 'Linux',
  web: 'Web', backend: 'Backend', creative: 'Creative',
  voice: 'Voice', aiml: 'AI/ML', cuda: 'CUDA',
  genai: 'GenAI', agents: 'Agents'
};
DOMAIN_ORDER.forEach((key, i) => {
  const x = i / (DOMAIN_ORDER.length - 1) * X_SPAN;
  const el = makeProjectedLabel(DOMAIN_SHORT[key], DOMAIN_COLORS[key], 9, 0.85);
  projectedLabels.push({ el, pos: new THREE.Vector3(x, 0, -0.3) });
});

function updateProjectedLabels() {
  const w = window.innerWidth, h = window.innerHeight;
  for (const lab of projectedLabels) {
    tmpVec.copy(lab.pos).project(camera);
    const inView = tmpVec.x >= -1 && tmpVec.x <= 1 && tmpVec.y >= -1 && tmpVec.y <= 1 && tmpVec.z < 1;
    if (!inView) {
      lab.el.style.opacity = '0';
      continue;
    }
    const sx = (tmpVec.x * 0.5 + 0.5) * w;
    const sy = (-tmpVec.y * 0.5 + 0.5) * h;
    lab.el.style.left = sx + 'px';
    lab.el.style.top  = sy + 'px';
    lab.el.style.opacity = lab.el.dataset.baseOpacity || '';
  }
}

// stash baseline opacities so we can restore after hiding
projectedLabels.forEach(lab => {
  lab.el.dataset.baseOpacity = lab.el.style.opacity;
});

// ── legend (11 domains) ────────────────────────────────────────────────────
(function buildLegend() {
  const legend = document.getElementById('legend');
  if (!legend) return;
  legend.innerHTML = '';
  DOMAIN_ORDER.forEach(key => {
    const row = document.createElement('div');
    row.className = 'row';
    const sw = document.createElement('span');
    sw.className = 'swatch';
    sw.style.background = DOMAIN_COLORS[key];
    sw.style.color = DOMAIN_COLORS[key];
    const lbl = document.createElement('span');
    lbl.textContent = DOMAIN_SHORT[key];
    row.appendChild(sw);
    row.appendChild(lbl);
    legend.appendChild(row);
  });
})();

// ── animate ────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();
  // gentle pulsing of front light
  frontLight.intensity = 18 + Math.sin(t * 0.7) * 4;
  updateLabels();
  updateProjectedLabels();
  renderer.render(scene, camera);
}
animate();

// ── resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

<script>
// theme toggle
(function(){
  const btn = document.getElementById('themeToggle');
  if (!btn) return;
  let stored = null;
  try { stored = localStorage.getItem('theme'); } catch(e) {}
  if (stored === 'light') {
    document.body.classList.add('light');
    btn.textContent = '🌙';
  }
  btn.addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light');
    btn.textContent = isLight ? '🌙' : '☀';
    try { localStorage.setItem('theme', isLight ? 'light' : 'dark'); } catch(e) {}
  });
})();
</script>
</body>
</html>
