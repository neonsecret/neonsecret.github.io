// ── layout constants ──────────────────────────────────────────────────────────
const LABEL_W  = 230;
const ROW_H    = 26;
const ROW_GAP  = 4;
const CAT_PRE  = 16;   // space before category header
const CAT_H    = 28;   // category header height
const CAT_POST = 6;    // space after header before first skill
const RIGHT_PAD = 60;
const TOP_PAD  = 50;   // axis
const CHART_W  = 1440;
const NOW      = 2026.42;  // May 2026

// compute total height
let totalH = TOP_PAD;
CATS.forEach((c,ci)=>{
  if(ci>0) totalH += CAT_PRE;
  totalH += CAT_H + CAT_POST;
  totalH += c.skills.length * (ROW_H + ROW_GAP);
});
totalH += 40; // bottom padding

const chartInnerW = CHART_W - LABEL_W - RIGHT_PAD;

const DECAY_HALF_LIFE = 1.8; // years
function currentDepth(s) {
  if (s.active) return s.depth;
  const floor = (s.decay ?? 0) * s.depth;
  const t = NOW - s.end;
  return floor + (s.depth - floor) * Math.exp(-t * Math.LN2 / DECAY_HALF_LIFE);
}

// ── svg ───────────────────────────────────────────────────────────────────────
const svg = d3.select('#chart')
  .attr('width',  CHART_W)
  .attr('height', totalH);

const defs = svg.append('defs');

// ── x scale ───────────────────────────────────────────────────────────────────
const xSc = d3.scaleLinear()
  .domain([2015, NOW + 0.1])
  .range([LABEL_W, LABEL_W + chartInnerW]);

// per-domain gradient defs
function makeGradId(color, active){ return 'g_'+color.replace('#','')+'_'+(active?'1':'0'); }

const gradDefs = new Set();
CATS.forEach(c=>{
  c.skills.forEach(s=>{
    const id = makeGradId(c.color, s.active);
    if(!gradDefs.has(id)){
      gradDefs.add(id);
      const grad = defs.append('linearGradient')
        .attr('id', id).attr('x1','0%').attr('x2','100%').attr('y1','0%').attr('y2','0%');
      grad.append('stop').attr('offset','0%')
        .attr('stop-color', c.color).attr('stop-opacity', 0.07);
      grad.append('stop').attr('offset','100%')
        .attr('stop-color', c.color)
        .attr('stop-opacity', s.active ? (s.depth / 10) * 0.88 : 0.28);
    }
  });
});

// decay tail gradients (color → transparent, one per category)
const decayGradSet = new Set();
CATS.forEach(c=>{
  const id = `dt_${c.color.replace('#','')}`;
  if(!decayGradSet.has(id)){
    decayGradSet.add(id);
    const tg = defs.append('linearGradient')
      .attr('id',id).attr('x1','0%').attr('x2','100%').attr('y1','0%').attr('y2','0%');
    tg.append('stop').attr('offset','0%').attr('stop-color',c.color).attr('stop-opacity','1');
    tg.append('stop').attr('offset','100%').attr('stop-color',c.color).attr('stop-opacity','0');
  }
});

// ── axis / grid ───────────────────────────────────────────────────────────────
const axisG = svg.append('g');
const axYears = d3.range(2015, 2027);

axYears.forEach(yr=>{
  const x = xSc(yr);
  axisG.append('line')
    .attr('class','axis-line')
    .attr('x1',x).attr('x2',x).attr('y1',TOP_PAD-10).attr('y2',totalH-20);
  axisG.append('text')
    .attr('class','axis-text')
    .attr('x',x).attr('y',TOP_PAD-16)
    .attr('text-anchor','middle')
    .text(yr);
});

// "now" line
axisG.append('line').attr('class','now-line')
  .attr('x1',xSc(NOW)).attr('x2',xSc(NOW))
  .attr('y1',TOP_PAD-10).attr('y2',totalH-20);
axisG.append('text').attr('class','now-label')
  .attr('x',xSc(NOW)+5).attr('y',TOP_PAD-16)
  .text('now');

// milestone lines

});

const labelsG = svg.append('g');
const tt = document.getElementById('tt');

  barsG.append('rect')
    .attr('x', hx).attr('y', curY)
    .attr('width', chartInnerW).attr('height', CAT_H)
    .attr('fill', c.color).attr('fill-opacity', 0.07)
    .attr('rx', 4);

  barsG.append('rect')
    .attr('x', hx).attr('y', curY)
    .attr('width', 3).attr('height', CAT_H)
    .attr('fill', c.color).attr('fill-opacity', 0.8)
    .attr('rx', 1.5);

  labelsG.append('text')
    .attr('class','cat-label')
    .attr('x', 0).attr('y', curY + CAT_H / 2 + 5)
    .attr('fill', c.color)
    .text(c.name);

  curY += CAT_H + CAT_POST;

  c.skills.forEach(s=>{
    const x0 = xSc(s.start);
    const x1 = Math.min(xSc(Math.min(s.end, NOW + 0.05)), xSc(NOW + 0.05));
    const barW = Math.max(x1 - x0, 4);
    const gradId = makeGradId(c.color, s.active);
    const cy = curY + ROW_H / 2;

    // background track
    barsG.append('rect')
      .attr('x', LABEL_W).attr('y', curY)
      .attr('width', chartInnerW).attr('height', ROW_H)
      .attr('fill', 'rgba(255,255,255,0.015)').attr('rx', 3);

    // skill bar
    const bar = barsG.append('rect')
      .attr('x', x0).attr('y', curY + 2)
      .attr('width', barW).attr('height', ROW_H - 4)
      .attr('fill', `url(#${gradId})`).attr('rx', 4)
      .style('cursor', 'pointer');

    // active glow cap on right edge
    if(s.active){
      barsG.append('rect')
        .attr('x', x1 - 3).attr('y', curY + 2)
        .attr('width', 3).attr('height', ROW_H - 4)
        .attr('fill', c.color).attr('fill-opacity', 0.7)
        .attr('rx', 1);
    }

    // decay tail: fading strip after end for inactive skills with residual retention
    if(!s.active && (s.decay ?? 0) > 0){
      const tailX0 = xSc(s.end);
      const tailX1 = Math.min(xSc(s.end + 2.5), xSc(NOW));
      if(tailX1 > tailX0 + 3){
        barsG.append('rect')
          .attr('x', tailX0).attr('y', curY + 5)
          .attr('width', tailX1 - tailX0).attr('height', ROW_H - 10)
          .attr('fill', `url(#dt_${c.color.replace('#','')})`)
          .attr('fill-opacity', s.decay * 0.55)
          .attr('rx', 2);
      }
    }

    // skill name
    const isActive = s.active;
    labelsG.append('text')
      .attr('class', 'skill-label' + (isActive ? ' active' : ''))
      .attr('x', LABEL_W - 10).attr('y', cy + 5)
      .attr('text-anchor','end')
      .text(s.name);

    // depth indicator dots — filled = retained, dim = faded, empty = never
    const effDepth = Math.round(currentDepth(s));
    const dotStartX = 4;
    for(let i=0; i<10; i++){
      let fill, opacity;
      if(i < effDepth){
        fill = c.color; opacity = isActive ? 0.72 : 0.45;       // retained
      } else if(i < s.depth){
        fill = c.color; opacity = 0.1;                           // faded — once knew
      } else {
        fill = 'rgba(255,255,255,0.05)'; opacity = 1;            // never reached
      }
      labelsG.append('rect')
        .attr('x', dotStartX + i*8).attr('y', cy - 3)
        .attr('width', 5).attr('height', 5).attr('rx', 1.5)
        .attr('fill', fill)
        .attr('fill-opacity', opacity);
    }

    // tooltip
    [bar].forEach(el => {
      el.on('mousemove', function(ev){
        const dur = s.end >= NOW ? `${Math.floor(s.start)} → now` : `${Math.floor(s.start)} → ${Math.floor(s.end)}`;
        const yrs = Math.round((Math.min(s.end, NOW) - s.start) * 10) / 10;
        tt.style.opacity = '1';
        tt.style.left = (ev.clientX + 16) + 'px';
        tt.style.top  = (ev.clientY - 20) + 'px';
        tt.innerHTML = `<div class="tt-name" style="color:${c.color}">${s.name}</div>
          <div class="tt-meta">${dur} &nbsp;·&nbsp; ${yrs}y &nbsp;·&nbsp; depth ${s.depth}/10</div>
          ${s.note ? `<div class="tt-note">${s.note}</div>` : ''}`;
      })
      .on('mouseleave', ()=>{ tt.style.opacity = '0'; });
    });

    curY += ROW_H + ROW_GAP;
  });
});

// milestone labels along the top axis area
MILESTONES.forEach((m, i)=>{
  const x = xSc(m.year);
  axisG.append('text').attr('class','ms-label')
    .attr('x', x + 4)
    .attr('y', TOP_PAD + 14 + (i % 2) * 13)
    .text(m.label);
});
</script>
<script>
(function(){
  const btn = document.getElementById('themeToggle');
  if(!btn) return;
  let stored = null;
  try { stored = localStorage.getItem('theme'); } catch(e) {}
  if(stored === 'light'){ document.body.classList.add('light'); btn.textContent='🌙'; }
  btn.addEventListener('click', ()=>{
    const isLight = document.body.classList.toggle('light');
    btn.textContent = isLight ? '🌙' : '☀';
    try { localStorage.setItem('theme', isLight ? 'light' : 'dark'); } catch(e) {}
    if(typeof onThemeChange === 'function') onThemeChange(isLight);
  });
})();
</script>
</body>
