// ── layout ─────────────────────────────────────────────────────────────────
const LEFT   = 72;    // year axis width
const RIGHT  = 20;
const TOP    = 16;    // small top padding (no labels)
const BOT    = 24;
const COL_W  = 96;    // px per domain column
const TOTAL_W = LEFT + DOMAINS.length * COL_W + RIGHT;
const Y_START = 2015, Y_END = 2026.5;
const Y_RANGE = Y_END - Y_START;

const TOTAL_H = TOP + DATA_H + BOT;

// intensity for domain at decimal year — includes ramp-in, full, and post-end decay
const RAMP      = 0.5;   // ramp-in duration (years)
const HALF_LIFE = 1.8;   // post-end decay half-life (years)

function intensity(domKey, yr) {
  let sum = 0;
  for (const s of SKILLS) {
    if (s.domain !== domKey) continue;
    let val = 0;
    const floor = (s.decay ?? 0) * s.depth;   // minimum retained depth after full decay

    if (yr < s.start - RAMP) {
      val = 0;
    } else if (yr < s.start) {
      val = s.depth * (yr - (s.start - RAMP)) / RAMP;
    } else if (yr <= s.end) {
      val = s.depth;
    } else {
      // exponential decay toward floor
      const t = yr - s.end;
      val = floor + (s.depth - floor) * Math.exp(-t * Math.LN2 / HALF_LIFE);
    }
    sum += Math.max(0, val);
  }
  return sum;
}

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return h;
}

function singleIntensity(s, yr) {
  const floor = (s.decay ?? 0) * s.depth;
  if (yr < s.start - RAMP) return 0;
  if (yr < s.start) return s.depth * (yr - (s.start - RAMP)) / RAMP;
  if (yr <= s.end) return s.depth;
  return Math.max(0, floor + (s.depth - floor) * Math.exp(-(yr - s.end) * Math.LN2 / HALF_LIFE));
}

function hexRGB(hex) {
  return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255];
}

// Build per-skill metadata: individual color, x-center, Gaussian weights
const domIdx = Object.fromEntries(DOMAINS.map((d,i) => [d.key, i]));
const SIGMA_SKILL = COL_W * 0.58;  // narrower than domain sigma → sub-skills distinguishable

const skillMeta = SKILLS.map(s => {
  const di = domIdx[s.domain] ?? 0;
  const color = SKILL_COLORS[s.name] ?? DOMAINS[di].color;
  const jitter = ((hashStr(s.name) % 56) - 28);
  const cx = LEFT + di * COL_W + COL_W * 0.5 + jitter;
  const gw = new Float32Array(TOTAL_W);
  for (let x = 0; x < TOTAL_W; x++) {
    const d = (x - cx) / SIGMA_SKILL;
    gw[x] = Math.exp(-0.5 * d * d);
  }
  return { s, rgb: hexRGB(color), gw };
});

const ctx = base.getContext('2d');
const img  = ctx.createImageData(TOTAL_W, TOTAL_H);
const data = img.data;

const SCALE = 0.62;   // per-skill contribution (lower to avoid washing out with many skills)

function renderGradient(light) {
  const BG = light ? [244,245,255] : [6,7,15];
  for (let i = 0; i < data.length; i += 4) {
    data[i]=BG[0]; data[i+1]=BG[1]; data[i+2]=BG[2]; data[i+3]=255;
  }
  for (let row = 0; row < DATA_H; row++) {
    const yr = Y_END - (row / DATA_H) * Y_RANGE;
    const py = TOP + row;
    const si_vals = skillMeta.map(m => singleIntensity(m.s, yr) / m.s.depth);
    for (let px = 0; px < TOTAL_W; px++) {
      let R = 0, G = 0, B = 0;
      for (let si = 0; si < skillMeta.length; si++) {
        const w = skillMeta[si].gw[px] * si_vals[si] * SCALE;
        if (w < 0.002) continue;
        const [r, g, b] = skillMeta[si].rgb;
        R = R + r * w * (1 - R);
        G = G + g * w * (1 - G);
        B = B + b * w * (1 - B);
      }
      const idx = (py * TOTAL_W + px) * 4;
      data[idx]   = R * 255;
      data[idx+1] = G * 255;
      data[idx+2] = B * 255;
    }
  }
  ctx.putImageData(img, 0, 0);
}

renderGradient(document.body.classList.contains('light'));
function onThemeChange(isLight){ renderGradient(isLight); }

function svgEl_(tag, attrs, parent) {
  const el = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  (parent || svgEl).appendChild(el);
  return el;
}

// ── spectrum bar + domain abbreviations (bottom of data area) ────────────
const defsEl = svgEl_('defs', {});
const sg = svgEl_('linearGradient', {id:'sg', x1:'0%', x2:'100%', y1:'0%', y2:'0%'}, defsEl);
DOMAINS.forEach((d, di) => {
  svgEl_('stop', {
    offset: ((di / (DOMAINS.length-1)) * 100).toFixed(1) + '%',
    'stop-color': d.color, 'stop-opacity': '0.65'
  }, sg);
});

const specY = TOP + DATA_H + 8;
svgEl_('rect', {
  x: LEFT, y: specY, width: DOMAINS.length * COL_W, height: 5,
  fill: 'url(#sg)', rx: '2.5'
});

DOMAINS.forEach((d, di) => {
  const cx = LEFT + di * COL_W + COL_W / 2;
  const lbl = svgEl_('text', {
    x: cx, y: specY + 17,
    fill: d.color, 'fill-opacity': '0.38',
    'font-size': '9', 'font-family': 'Space Grotesk, system-ui',
    'text-anchor': 'middle'
  });
  lbl.textContent = d.name.split(' ')[0];
});

// year axis (left)
for (let yr = 2015; yr <= 2026; yr++) {
  const py = TOP + ((Y_END - yr) / Y_RANGE) * DATA_H;
  // tick line across full width
  svgEl_('line', {
    x1: LEFT - 4, y1: py, x2: TOTAL_W - RIGHT, y2: py,
    stroke: 'rgba(255,255,255,0.06)', 'stroke-width': '1'
  });
  // year label
  const lbl = svgEl_('text', {
    x: LEFT - 8, y: py + 4, fill: '#a0a2bc',
    'font-size': '12', 'font-family': 'Space Grotesk, system-ui',
    'text-anchor': 'end',
    'paint-order': 'stroke', stroke: '#06070f', 'stroke-width': '3', 'stroke-linejoin': 'round'
  });
  lbl.textContent = yr;
}

// "now" line
const nowY = TOP + ((Y_END - 2026.42) / Y_RANGE) * DATA_H;
svgEl_('line', {
  x1: LEFT, y1: nowY, x2: TOTAL_W - RIGHT, y2: nowY,
  stroke: 'rgba(255,255,255,0.35)', 'stroke-width': '1.5'
});
const nowLbl = svgEl_('text', {
  x: TOTAL_W - RIGHT - 6, y: nowY - 4,
  fill: 'rgba(255,255,255,0.5)', 'font-size': '11',
  'font-family': 'Space Grotesk, system-ui', 'text-anchor': 'end'
});
nowLbl.textContent = 'now';

// milestones: dot + dashed line only (label shown on hover via tooltip)
const msDots = [];
MILESTONES.forEach(m => {
  const py = TOP + ((Y_END - m.year) / Y_RANGE) * DATA_H;
  const dot = svgEl_('circle', {
    cx: LEFT - 2, cy: py, r: '4', fill: '#8a8caa',
    style: 'cursor:default', title: m.label
  });
  svgEl_('line', {
    x1: LEFT - 2, y1: py, x2: TOTAL_W - RIGHT, y2: py,
    stroke: 'rgba(255,255,255,0.07)', 'stroke-width': '1', 'stroke-dasharray': '3 5'
  });
  msDots.push({el: dot, m, py});
});

// milestone hover (left margin dots)
msDots.forEach(({el, m}) => {
  el.addEventListener('mouseenter', ev => {
    const _tt = document.getElementById('tt');
    _tt.style.opacity = '1';
    _tt.style.left    = (ev.clientX + 14) + 'px';
    _tt.style.top     = (ev.clientY - 16) + 'px';
    _tt.innerHTML = `<div class="tt-name" style="color:#c8cadf">${m.label}</div>
      <div class="tt-meta">${Math.floor(m.year)}</div>`;
  });
  el.addEventListener('mouseleave', () => { document.getElementById('tt').style.opacity = '0'; });
});

// ── skill dots ─────────────────────────────────────────────────────────────

const dotData = [];
SKILLS.forEach(s => {
  const di = DOMAINS.findIndex(d => d.key === s.domain);
  if (di < 0) return;
  const d = DOMAINS[di];

  const cx     = LEFT + di * COL_W + COL_W / 2;
  const jitter = ((hashStr(s.name) % 56) - 28);
  const dotX   = cx + jitter;
  const activeEnd = Math.min(s.end, 2026.42);
  const midYr  = (s.start + activeEnd) / 2;
  const dotY   = TOP + ((Y_END - midYr) / Y_RANGE) * DATA_H;
  const r      = 1.5 + (s.depth / 10) * 5.5;  // 1.5 (depth 0) → 7.0 (depth 10)
  const active = s.end >= 2026.4;

  const sColor = SKILL_COLORS[s.name] ?? d.color;
  if (active) {
    svgEl_('circle', {
      cx: dotX, cy: dotY, r: r + 3.5,
      fill: 'none', stroke: sColor, 'stroke-opacity': '0.22', 'stroke-width': '1'
    });
  }
  const dot = svgEl_('circle', {
    cx: dotX, cy: dotY, r,
    fill: sColor, 'fill-opacity': active ? '0.92' : '0.45',
    style: 'cursor:pointer; transition: r 0.1s'
  });

  dotData.push({el: dot, s, d, x: dotX, y: dotY, r});
});

// ── hover: snap to nearest dot within 14px, else show domain context ──────
const tt   = document.getElementById('tt');
const wrap = document.getElementById('wrap');

let prevDot = null;
wrap.addEventListener('mousemove', ev => {
  const rect = base.getBoundingClientRect();
  const mx = ev.clientX - rect.left;
  const my = ev.clientY - rect.top;

  // find closest dot
  let best = null, bestD = Infinity;
  for (const dot of dotData) {
    const d = Math.hypot(mx - dot.x, my - dot.y);
    if (d < bestD) { bestD = d; best = dot; }
  }

  if (prevDot) { prevDot.el.setAttribute('r', prevDot.r); prevDot = null; }

  if (best && bestD < 16) {
    // show exact skill
    best.el.setAttribute('r', best.r + 2);
    prevDot = best;
    const dur = best.s.end >= 2026.4
      ? `${Math.floor(best.s.start)} → now`
      : `${Math.floor(best.s.start)} → ${Math.floor(best.s.end)}`;
    tt.style.opacity = '1';
    tt.style.left    = (ev.clientX + 14) + 'px';
    tt.style.top     = (ev.clientY - 16) + 'px';
    tt.innerHTML = `<div class="tt-name" style="color:${best.d.color}">${best.s.name}</div>
      <div class="tt-meta">${dur} &nbsp;·&nbsp; depth ${best.s.depth}/10</div>
      <div class="tt-meta" style="font-size:11px;color:#5a5c78;margin-top:2px">${best.d.name}</div>`;
  } else {
    // fallback: show domain context
    const di = Math.floor((mx - LEFT) / COL_W);
    if (di < 0 || di >= DOMAINS.length || my < TOP || my > TOP + DATA_H) {
      tt.style.opacity = '0'; return;
    }
    const d  = DOMAINS[di];
    const yr = Y_END - ((my - TOP) / DATA_H) * Y_RANGE;
    const active = SKILLS
      .filter(s => s.domain === d.key && yr >= s.start - 0.3 && yr <= s.end + 0.4)
      .sort((a,b) => b.depth - a.depth).slice(0,5).map(s => s.name).join(', ');
    tt.style.opacity = '1';
    tt.style.left    = (ev.clientX + 14) + 'px';
    tt.style.top     = (ev.clientY - 16) + 'px';
    tt.innerHTML = `<div class="tt-name" style="color:${d.color}">${d.name}</div>
      <div class="tt-meta">${Math.floor(yr)}</div>
      <div class="tt-meta" style="font-size:11px;color:#5a5c78;margin-top:2px">${active}</div>`;
  }
});
wrap.addEventListener('mouseleave', () => {
  tt.style.opacity = '0';
  if (prevDot) { prevDot.el.setAttribute('r', prevDot.r); prevDot = null; }
});

// ── size the wrapper ───────────────────────────────────────────────────────
document.getElementById('wrap').style.width = TOTAL_W + 'px';

// ── populate legend ────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
legendEl.innerHTML = DOMAINS.map(d =>
  `<div style="display:flex;align-items:center;gap:7px">
     <span style="width:8px;height:8px;border-radius:50%;background:${d.color};flex-shrink:0;opacity:0.75;display:inline-block"></span>
     <span style="color:${d.color};opacity:0.7">${d.name}</span>
   </div>`
).join('');
</script>
<script>
(function(){
  const btn = document.getElementById('themeToggle');
  if(!btn) return;
  let stored = null;
  try { stored = localStorage.getItem('theme'); } catch(e) {}
  if(stored === 'light'){ document.body.classList.add('light'); btn.textContent='🌙'; if(typeof onThemeChange === 'function') onThemeChange(true); }
  btn.addEventListener('click', ()=>{
    const isLight = document.body.classList.toggle('light');
    btn.textContent = isLight ? '🌙' : '☀';
    try { localStorage.setItem('theme', isLight ? 'light' : 'dark'); } catch(e) {}
    if(typeof onThemeChange === 'function') onThemeChange(isLight);
  });
})();
</script>
</body>
</html>
